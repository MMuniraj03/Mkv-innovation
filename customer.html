<!DOCTYPE html>
<html>
<head>
<title>MKV Innovation - Customer Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#001f3f,#003366,#002244,#001a33);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow:hidden;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating particles */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.05;
animation:moveParticles 60s linear infinite;
}

@keyframes moveParticles{
from{transform:translate(0,0);}
to{transform:translate(-500px,-500px);}
}

/* Glass Card */
.container{
position:relative;
width:90%;
max-width:420px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(0,0,0,0.6);
z-index:1;
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

.required{color:#ff4d4d;}

input{
width:100%;
padding:12px;
margin-top:5px;
border-radius:25px;
border:none;
outline:none;
transition:0.3s;
}

input:focus{
box-shadow:0 0 15px #00ccff;
transform:scale(1.03);
}

/* Water Drop Silver Button */
button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:30px;
font-size:17px;
font-weight:bold;
background:linear-gradient(to bottom,#e6e6e6,#bfbfbf);
color:#003366;
cursor:pointer;
transition:0.3s;
opacity:0.5;
pointer-events:none;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

button.enabled{
opacity:1;
pointer-events:auto;
}

button.enabled:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 15px 35px rgba(255,255,255,0.6);
}

/* Success Popup */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#003366;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
z-index:5;
transition:0.4s;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.spinner{
border:5px solid #eee;
border-top:5px solid #003366;
border-radius:50%;
width:40px;
height:40px;
margin:15px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
<h1>Customer Details</h1>

<label><span class="required">*</span> Full Name</label>
<input type="text" id="name">

<label><span class="required">*</span> Mobile Number</label>
<input type="tel" id="mobile">

<label><span class="required">*</span> Gmail ID</label>
<input type="email" id="gmail">

<label><span class="required">*</span> Address</label>
<input type="text" id="address">

<button id="orderBtn" onclick="placeOrder()">Confirm Order</button>
</div>

<div class="popup" id="successPopup">
<h2>Order Confirmed 🎉</h2>
<p>Wait for Order Tracking ID</p>
<div class="spinner"></div>
</div>

<script>
const inputs=document.querySelectorAll("input");
const button=document.getElementById("orderBtn");
const popup=document.getElementById("successPopup");

inputs.forEach(input=>{
input.addEventListener("input",checkFields);
});

function checkFields(){
let filled=true;
inputs.forEach(input=>{
if(input.value.trim()===""){filled=false;}
});
if(filled){
button.classList.add("enabled");
}else{
button.classList.remove("enabled");
}
}

function placeOrder(){

if(!button.classList.contains("enabled")) return;

if(confirm("MKV says: Confirm your order?")){
if(confirm("MKV says: Are you sure to place order?")){

let data={
product:localStorage.getItem("product"),
color:localStorage.getItem("color"),
quantity:localStorage.getItem("quantity"),
name:document.getElementById("name").value,
mobile:document.getElementById("mobile").value,
gmail:document.getElementById("gmail").value,
address:document.getElementById("address").value
};

fetch("https://script.google.com/macros/s/AKfycbyCA6lrcTEcm_IQFS--zQIFmAjJvX_qmgdh6cRxduHcogIrdrDPz6xEl72f8pR1KrZPOQ/exec",{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
.then(()=>{
popup.classList.add("active");
setTimeout(()=>{
window.location.href="index.html";
},10000);
})
.catch(()=>alert("Error sending order"));

}
}
}
</script>

</body>
</html>
