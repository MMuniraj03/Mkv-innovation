<!DOCTYPE html>
<html>
<head>
<title>MKV Innovation - Customer Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background: linear-gradient(to bottom, #001f3f, #003366);
color:white;
text-align:center;
padding:20px;
}

h1{
margin-top:30px;
}

label{
display:block;
text-align:left;
width:90%;
margin:auto;
margin-top:10px;
font-weight:bold;
}

.required{
color:red;
}

input{
width:90%;
padding:15px;
margin:5px 0 10px 0;
border-radius:30px;
border:none;
font-size:16px;
}

button{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:linear-gradient(to bottom,#c0c0c0,#e6e6e6);
color:#003366;
font-weight:bold;
opacity:0.5;
pointer-events:none;
}

button.enabled{
opacity:1;
pointer-events:auto;
}
</style>
</head>

<body>

<h1>Customer Details</h1>

<label><span class="required">*</span> Full Name</label>
<input type="text" id="name">

<label><span class="required">*</span> Mobile Number</label>
<input type="tel" id="mobile">

<label><span class="required">*</span> Gmail ID</label>
<input type="email" id="gmail">

<label><span class="required">*</span> Address</label>
<input type="text" id="address">

<br>
<button id="orderBtn" onclick="placeOrder()">Confirm Order</button>

<script>

// Enable button only if all fields filled
const inputs = document.querySelectorAll("input");
const button = document.getElementById("orderBtn");

inputs.forEach(input => {
input.addEventListener("input", checkFields);
});

function checkFields(){
let allFilled = true;
inputs.forEach(input => {
if(input.value.trim() === ""){
allFilled = false;
}
});

if(allFilled){
button.classList.add("enabled");
}else{
button.classList.remove("enabled");
}
}

function placeOrder(){

if(!button.classList.contains("enabled")){
return;
}

if(confirm("MKV says: Confirm your order?")){
if(confirm("MKV says: Are you sure to place order?")){

let data = {
product: localStorage.getItem("product"),
color: localStorage.getItem("color"),
quantity: localStorage.getItem("quantity"),
name: document.getElementById("name").value,
mobile: document.getElementById("mobile").value,
gmail: document.getElementById("gmail").value,
address: document.getElementById("address").value
};

fetch("https://script.google.com/macros/s/AKfycbyCA6lrcTEcm_IQFS--zQIFmAjJvX_qmgdh6cRxduHcogIrdrDPz6xEl72f8pR1KrZPOQ/exec", {
method: "POST",
mode: "no-cors",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(data)
})
.then(() => {
alert("Order Confirmed!\nWait for Order Tracking ID");
setTimeout(function(){
window.location.href="index.html";
},10000);
})
.catch(() => alert("Error sending order"));

}
}

}
</script>

</body>
</html>
