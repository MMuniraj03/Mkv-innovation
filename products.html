<!DOCTYPE html>
<html>
<head>
<title>Select Product - MKV Innovation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to bottom,#001f3f,#002244);
color:white;
text-align:center;
padding:20px;
}

select,input{
padding:12px;
margin:10px;
border-radius:20px;
border:none;
}

img{
width:250px;
border-radius:20px;
margin:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.4s;
}

img:hover{
transform:scale(1.05);
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:linear-gradient(to bottom,#e6e6e6,#bfbfbf);
color:#003366;
font-weight:bold;
cursor:pointer;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#003366;
padding:20px;
border-radius:20px;
display:none;
}
</style>
</head>

<body>

<h1>Select Your Product</h1>

<img id="productImage" src="round.jpg">

<br>

<select id="type" onchange="changeImage()">
<option value="Round">Round (O-Shape)</option>
<option value="Elongated">Elongated</option>
<option value="D-Shape">D-Shape</option>
<option value="Square">Square</option>
</select>

<select id="color">
<option>White</option>
<option>Black</option>
<option>Blue</option>
<option>Pink</option>
<option>Silver</option>
<option>Golden</option>
</select>

<input type="number" id="quantity" min="1" value="1">

<br>
<button onclick="showPopup()">Next</button>

<div class="popup" id="popupBox">
<h3>MKV say</h3>
<p id="summary"></p>
<button onclick="confirmOrder()">Confirm</button>
<button onclick="closePopup()">X</button>
</div>

<script>
function changeImage(){
let type=document.getElementById("type").value;
let img=document.getElementById("productImage");

if(type=="Round") img.src="round.jpg";
if(type=="Elongated") img.src="elongated.jpg";
if(type=="D-Shape") img.src="dshape.jpg";
if(type=="Square") img.src="square.jpg";
}

function showPopup(){
let type=document.getElementById("type").value;
let color=document.getElementById("color").value;
let quantity=document.getElementById("quantity").value;

document.getElementById("summary").innerHTML=
"Product: "+type+"<br>Color: "+color+"<br>Quantity: "+quantity;

document.getElementById("popupBox").style.display="block";
}

function closePopup(){
document.getElementById("popupBox").style.display="none";
}

function confirmOrder(){
localStorage.setItem("product",document.getElementById("type").value);
localStorage.setItem("color",document.getElementById("color").value);
localStorage.setItem("quantity",document.getElementById("quantity").value);

window.location.href="customer.html";
}
</script>

</body>
</html>
