<!DOCTYPE html>
<html>
<head>
<title>MKV Innovation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(180deg,#001f3f,#003366,#000814);
color:white;
text-align:center;
overflow-x:hidden;
}

/* Animated particles */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(255,255,255,0.15) 2px,transparent 2px);
background-size:50px 50px;
animation:move 20s linear infinite;
z-index:-1;
}
@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(-50px,-50px);}
}

.header{
padding:40px;
font-size:32px;
color:silver;
text-shadow:0 0 20px white;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
margin:20px;
padding:25px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,191,255,0.4);
transition:0.5s;
}

.glass:hover{
transform:rotateX(5deg) rotateY(5deg);
}

.product-images{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.product-images img{
width:150px;
border-radius:15px;
transition:0.5s;
box-shadow:0 0 20px rgba(0,191,255,0.6);
}

.product-images img:hover{
transform:translateY(-15px) scale(1.1);
box-shadow:0 0 30px silver;
}

.btn{
margin-top:30px;
padding:15px 35px;
background:linear-gradient(145deg,#c0c0c0,#e6e6e6);
border:none;
border-radius:40px;
font-size:18px;
color:#003366;
font-weight:bold;
cursor:pointer;
box-shadow:0 8px 20px rgba(255,255,255,0.5);
transition:0.4s;
}

.btn:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 15px 30px rgba(255,255,255,0.7);
}
</style>
</head>

<body>

<div class="header">MKV Innovation</div>

<div class="glass">
<h2>Premium Customised Toilet Seats</h2>
<p>Luxury • Comfort • Innovation</p>

<div class="product-images">
<img src="square.jpg">
<img src="dshape.jpg">
<img src="elongated.jpg">
<img src="round.jpg">
</div>

<button class="btn" onclick="location.href='products.html'">Select Product</button>
</div>

</body>
</html>
