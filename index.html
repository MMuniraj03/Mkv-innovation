<!DOCTYPE html>
<html>
<head>
<title>MKV Innovation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body {
margin:0;
font-family:'Orbitron', sans-serif;
background: linear-gradient(135deg,#2c003e,#000428,#004e92);
color:white;
text-align:center;
}

.header {
padding:40px 20px;
font-size:32px;
font-weight:600;
letter-spacing:3px;
color:gold;
text-shadow:0 0 10px gold;
}

.glass {
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
margin:20px;
padding:25px;
box-shadow:0 0 25px rgba(255,215,0,0.2);
}

.product-images {
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.product-images img {
width:150px;
border-radius:15px;
transition:0.4s;
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.product-images img:hover {
transform:scale(1.1);
box-shadow:0 0 25px gold;
}

.btn {
margin-top:30px;
padding:15px 35px;
background:linear-gradient(45deg,gold,#ffd700);
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.4s;
}

.btn:hover {
transform:scale(1.1);
box-shadow:0 0 20px gold;
}

.footer {
margin-top:40px;
padding:15px;
font-size:14px;
color:silver;
}

</style>
</head>

<body>

<div class="header">MKV Innovation</div>

<div class="glass">
<h2>Premium Customised Toilet Seats</h2>
<p>Modern • Royal • Comfortable • Durable</p>

<div class="product-images">
<img src="square.jpg">
<img src="dshape.jpg">
<img src="elongated.jpg">
<img src="round.jpg">
</div>

<button class="btn" onclick="location.href='products.html'">View Product Types</button>

</div>

<div class="footer">
© 2026 MKV Innovation | Designed for Premium Bathrooms
</div>

</body>
</html>
