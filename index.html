<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MKV Innovation | Customised Toilet Seats</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family: 'Orbitron', system-ui; background: radial-gradient(circle at top, #2b1055, #0b1020); color:#eaeaf0; }
.hero { background: linear-gradient(135deg, #3b1d6b, #0a7cff); padding:28px 18px; text-align:center; }
.hero h1 { margin:0 0 6px; font-size:26px; letter-spacing:1px; }
.container { padding:18px; max-width:900px; margin:auto; }
.grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin:16px 0; }
.card { background: linear-gradient(145deg, #1a1f3a, #10152b); border-radius:14px; padding:12px; box-shadow:0 8px 22px rgba(0,0,0,.35); }
.card img { width:100%; border-radius:10px; height:140px; object-fit:cover; }
.btn { display:block; width:100%; background: linear-gradient(135deg, gold, silver, royalblue); color:#000; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:700; }
footer { text-align:center; color:#aaa; padding:18px 10px 28px; }
</style>
</head>
<body>
<section class="hero">
  <h1>MKV Innovation</h1>
  <p>Royal • Futuristic • Customised Toilet Seats</p>
</section>

<div class="container">
  <h2>Product Types</h2>
  <div class="grid">
    <div class="card"><img src="square.jpg"><p>Square (Rectangular)</p></div>
    <div class="card"><img src="dshape.jpg"><p>D-Shape</p></div>
    <div class="card"><img src="elongated.jpg"><p>Elongated (Oval / V-Shape)</p></div>
    <div class="card"><img src="round.jpg"><p>Round (O-Shape)</p></div>
  </div>
  <a href="products.html"><button class="btn">View Products</button></a>
</div>

<footer>© 2026 MKV Innovation</footer>
</body>
</html>
