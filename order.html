<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place Order | MKV Innovation</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family: 'Orbitron', system-ui; background: radial-gradient(circle at top, #2b1055, #0b1020); color:#eaeaf0; }
header { background: linear-gradient(135deg, #3b1d6b, #0a7cff); padding:14px 16px; font-weight:700; }
.wrap { padding:16px; max-width:900px; margin:auto; }
.card { background: linear-gradient(145deg, #1a1f3a, #10152b); border-radius:14px; box-shadow:0 8px 22px rgba(0,0,0,.35); padding:16px; }
.summary { background:#151a33; border-radius:10px; padding:12px; white-space:pre-line; margin-bottom:10px; }
label { font-size:12px; color:#cfd3ff; }
input, textarea { width:100%; padding:12px; border-radius:10px; border:1px solid #3b3f66; background:#0b1020; color:#fff; margin:6px 0 10px; }
.btn { background: linear-gradient(135deg, gold, silver, royalblue); color:#000; border:none; border-radius:12px; padding:14px; width:100%; font-weight:800; }
</style>
</head>
<body>
<header>MKV Innovation – Customer Details</header>
<div class="wrap">
  <div class="card">
    <div class="summary" id="orderInfo"></div>

    <label>Full Name</label>
    <input required placeholder="Your name" />
    <label>Mobile Number</label>
    <input required placeholder="10-digit mobile number" />
    <label>Address</label>
    <textarea required placeholder="Delivery address"></textarea>
    <label>Gmail ID</label>
    <input required placeholder="yourname@gmail.com" />

    <button class="btn" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<script>
orderInfo.textContent =
`Product: ${localStorage.getItem('product')}
Colour: ${localStorage.getItem('color')}
Quantity: ${localStorage.getItem('qty')}`;

function placeOrder(){
  if(confirm('MKV say: Are you sure you want to place this order?')){
    if(confirm('MKV say: Please confirm again to proceed.')){
      alert('MKV say: Order Confirmed! Please wait for order tracking ID');
      setTimeout(()=> location.href='index.html', 10000);
    }
  }
}
</script>
</body>
</html>
