<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Place Order | MKV Innovation</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Arial, sans-serif; background:#f4f7fb; }
    header { background:#0a7cff; color:#fff; padding:14px 16px; font-weight:700; }
    .wrap { padding:16px; max-width:900px; margin:auto; }
    .card { background:#fff; border-radius:14px; box-shadow:0 6px 16px rgba(0,0,0,.08); padding:16px; }
    .summary { background:#f1f5ff; border-radius:10px; padding:12px; white-space:pre-line; margin-bottom:10px; }
    label { font-size:12px; color:#555; }
    input, textarea { width:100%; padding:12px; border-radius:10px; border:1px solid #e5e7eb; margin:6px 0 10px; }
    .btn { background:#16a34a; color:#fff; border:none; border-radius:12px; padding:14px; width:100%; font-weight:700; }
  </style>
</head>
<body>
  <header>MKV Innovation – Customer Details</header>
  <div class="wrap">
    <div class="card">
      <div class="summary" id="orderInfo"></div>

      <label>Full Name</label>
      <input required placeholder="Your name" />
      <label>Mobile Number</label>
      <input required placeholder="10-digit mobile number" />
      <label>Address</label>
      <textarea required placeholder="Delivery address"></textarea>
      <label>Gmail ID</label>
      <input required placeholder="yourname@gmail.com" />

      <button class="btn" onclick="placeOrder()">Place Order</button>
    </div>
  </div>

  <script>
    orderInfo.textContent =
      `Product: ${localStorage.getItem('product')}\nColour: ${localStorage.getItem('color')}\nQuantity: ${localStorage.getItem('qty')}`;

    function placeOrder(){
      if(confirm('Are you sure you want to place this order?')){
        if(confirm('Please confirm again to proceed.')){
          alert('Order Confirmed! Please wait for order tracking ID');
          setTimeout(()=> location.href='index.html', 10000);
        }
      }
    }
  </script>
</body>
</html>
